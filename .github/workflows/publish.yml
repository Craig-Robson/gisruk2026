on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
      
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libfontconfig1-dev libfreetype6-dev libharfbuzz-dev libfribidi-dev

      - name: Install system dependencies for ragg
        run: |
          sudo apt-get update
          sudo apt-get install -y libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev libwebp-dev
          
      - name: Set up RLang
        uses: r-lib/actions/setup-r@v2
     
      - name: Install rmarkdown
        run: |
          install.packages(c("rmarkdown", "tidyverse", "otherpackage"))
        shell: Rscript {0}

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          cname: gisruk.github.io 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
